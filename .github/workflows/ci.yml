# CI runs on PRs from untrusted branches, so it exposes NO secrets (a compromised branch
# would exfiltrate them). The job name `ci` is the required status check in the ruleset.
name: CI
on:
  pull_request:
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22.14'
      - run: npm install --no-audit --no-fund
      - run: npm run build
      - run: npm run lint
      - run: npm test
